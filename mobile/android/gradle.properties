org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation: when the project (D:) and the Flutter pub
# cache (C:) are on different Windows drives, the incremental compiler's relocatable
# path converter throws "different roots" and plugin builds fail. Full (non-incremental)
# compilation avoids that path entirely.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
