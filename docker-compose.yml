services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - facemodels:/root/.insightface
      - visitorcrops:/app/var/visitor_crops
      - memberphotos:/app/var/member_photos
    # Run migrations then start the API.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  bot:
    build: ./backend
    env_file: ./backend/.env
    restart: unless-stopped   # so the bot relaunches with a new token when admin changes it
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - facemodels:/root/.insightface
      - visitorcrops:/app/var/visitor_crops
      - memberphotos:/app/var/member_photos
    command: ["python", "-m", "app.telegram.bot"]

volumes:
  pgdata:
  facemodels:
  visitorcrops:
  memberphotos:
